schemaVersion: "1"
kind: agent
name: dev

agent:
  image: "ghcr.io/typisttech/sandbox-templates:shell"
  aiFilename: AGENTS.md
  entrypoint:
    run: [bash]
    args: ["--login"]

network:
  allowedDomains:
    - "mise.en.dev:443"
    - "cache.ruby-lang.org"
    - "go.dev:443"

environment:
  variables:
    IS_SANDBOX: "1"

    # Telemetry
    DISABLE_TELEMETRY: "1"
    DO_NOT_TRACK: "1"
    SBX_NO_TELEMETRY: "1"

    # Mise
    ## Treat the whole sandbox filesystem as trusted so `.mise.toml` files don't trigger an
    ## interactive trust prompt. This is appropriate inside a sandbox: the user has already
    ## opted into running this code by attaching the workspace.
    MISE_TRUSTED_CONFIG_PATHS: "/"
    ## Disable telemetry by default - https://mise.jdx.dev/configuration/settings.html#use_versions_host_track
    MISE_USE_VERSIONS_HOST_TRACK: "false"

    # rtk
    RTK_TELEMETRY_DISABLED: "1"

    # Human
    EDITOR: nano
    ## For Ghostty - https://ghostty.org/docs/help/terminfo
    TERM: xterm-ghostty

  proxyManaged:
    - GITHUB_TOKEN
    - GH_TOKEN
    - MISE_GITHUB_TOKEN

commands:
  install:
    # Git
    - command: |
        set -euo pipefail
        git config --global user.name "TangRufus"
        git config --global user.email tangrufus@gmail.com
        git config --global alias.co checkout
        git config --global alias.br branch
        git config --global alias.ci commit
        git config --global alias.st status
        git config --global alias.lg "log --date=auto:human --color --graph --pretty=format:'%Cred%h%Creset -%C(yellow)%d%Creset %s %Cgreen(%cd) %C(bold blue)<%an>%Creset' --abbrev-commit"
        git config --global color.ui true
        git config --global init.defaultbranch main
      user: "1000"

    # Go
    - command: |
        set -euo pipefail
        go telemetry off
      user: "1000"

    # rtk
    - command: |
        set -euo pipefail
        mkdir -p ~/.local/share
        ln -s /Users/work/Developer/Agents/rtk/share ~/.local/share/rtk

        mise exec -- rtk telemetry disable
      user: "1000"
