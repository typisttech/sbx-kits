schemaVersion: "1"
kind: agent
name: opencode

agent:
  image: "typisttech/sandbox-templates:shell"
  aiFilename: AGENTS.md
  entrypoint:
    run: ["opencode"]

environment:
  variables:
    IS_SANDBOX: "1"
    OPENCODE_AUTO_SHARE: "false"
    OPENCODE_EXPERIMENTAL_LSP_TOOL: "true"
    OPENCODE_EXPERIMENTAL_MARKDOWN: "true"
    OPENCODE_EXPERIMENTAL_PARALLEL: "true"
    OPENCODE_EXPERIMENTAL_PLAN_MODE: "true"
    OPENCODE_EXPERIMENTAL_SCOUT: "true"

commands:
  install:
    - command: |
        set -euo pipefail
        mkdir -p ~/.config
        ln -s /Users/work/Developer/Agents/opencode/config ~/.config/opencode

        mkdir -p ~/.local/share
        ln -s /Users/work/Developer/Agents/opencode/share ~/.local/share/opencode

        mkdir -p ~/.local/state
        ln -s /Users/work/Developer/Agents/opencode/state ~/.local/state/opencode
      user: "1000"
      description: Symlink opencode configuration, state, and share directories

    - command: brew install anomalyco/tap/opencode
      user: "1000"
      description: Install opencode via Homebrew
