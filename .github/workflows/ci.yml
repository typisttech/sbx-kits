name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * *'
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - run: curl --proto '=https' --tlsv1.2 -fsSL https://get.docker.com | sudo REPO_ONLY=1 sh
      - run: sudo apt-get install docker-sbx
      - run: sbx version

      - name: Validate Kits
        run: |
          set -euxo pipefail
          for dir in */
          do
            sbx kit validate "$dir"
          done

  image:
    runs-on: ubuntu-24.04-arm
    needs:
      - test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.TASTENDRUCK_CLIENT_ID }}
          private-key: ${{ secrets.TASTENDRUCK_PRIVATE_KEY }}
          # Critical: Minimal permissions. This token is used in docker build secrets
          permission-contents: read

      - uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        if: github.event_name != 'pull_request' && github.ref_name == 'main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/sandbox-templates
          tags: |
            type=raw,value=shell

      - uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318 # v6.0.0
        with:
          context: ./shell
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          secrets: |
            GH_TOKEN=${{ steps.app-token.outputs.token }}
