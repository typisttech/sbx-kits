schemaVersion: "1"
kind: mixin
name: mise

environment:
  variables:
    # Treat the whole sandbox filesystem as trusted so `.mise.toml` files don't trigger an
    # interactive trust prompt. This is appropriate inside a sandbox: the user has already
    # opted into running this code by attaching the workspace.
    MISE_TRUSTED_CONFIG_PATHS: "/"
    # Disable telemetry by default - see https://mise.jdx.dev/configuration/settings.html#use_versions_host_track
    MISE_USE_VERSIONS_HOST_TRACK: "false"

commands:
  install:
    - command: brew install mise
      user: "1000"

  startup:
    - command: ["mise", "install"]
      user: "1000"
      background: true
      description: "Install dependencies with mise in the background"
